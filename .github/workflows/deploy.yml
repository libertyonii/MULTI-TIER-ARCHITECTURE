name: Azure Multi-Tier Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'deploy.sh'
      - 'nsg-config.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - nsg-only
          - verify
          - teardown

env:
  RESOURCE_GROUP: Multi-tier-archi
  LOCATION: southafricanorth
  ADMIN_USER: libo

jobs:
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: |
          shellcheck deploy.sh
          shellcheck nsg-config.sh
          shellcheck verify-connectivity.sh

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.inputs.action == 'deploy' || github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa.pub

      - name: Run deployment
        run: |
          chmod +x deploy.sh
          bash deploy.sh

      - name: Save IP addresses
        uses: actions/upload-artifact@v4
        with:
          name: vm-ips
          path: /tmp/multitier-ips.env
          retention-days: 7

  nsg-only:
    name: Apply NSG Rules Only
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.inputs.action == 'nsg-only'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Apply NSG rules
        run: |
          chmod +x nsg-config.sh
          bash nsg-config.sh

  verify:
    name: Verify Connectivity
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'verify'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download VM IPs
        uses: actions/download-artifact@v4
        with:
          name: vm-ips
          path: /tmp

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run connectivity tests
        run: |
          chmod +x verify-connectivity.sh
          bash verify-connectivity.sh

  teardown:
    name: Teardown Resources
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'teardown'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Delete resource group
        run: |
          az group delete --name "${{ env.RESOURCE_GROUP }}" --yes --no-wait
          echo "Teardown initiated."
